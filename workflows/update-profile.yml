name: Update Profile README

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 8:12 AM America/New_York during daylight time / 7:12 AM during standard time.
    # GitHub cron schedules run in UTC.
    - cron: "12 12 * * *"
  push:
    paths:
      - "data/**"
      - "scripts/**"
      - "README.md"
      - ".github/workflows/update-profile.yml"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate dynamic README sections
        run: npm run update

      - name: Commit updated README if changed
        run: |
          if git diff --quiet README.md; then
            echo "README.md is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update profile README"
          git push
