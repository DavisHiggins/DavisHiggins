<svg width="1200" height="72" viewBox="0 0 1200 72" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated section divider">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4B9FE1" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#4B9FE1" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#F7FBFF" stop-opacity="0.95"/>
      <stop offset="0.8" stop-color="#4B9FE1" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4B9FE1" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1200 0" to="1200 0" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <rect y="35" width="1200" height="2" rx="1" fill="url(#g)"/>
  <circle cx="600" cy="36" r="7" fill="#B8D9F3">
    <animate attributeName="r" values="5;9;5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".45;1;.45" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
