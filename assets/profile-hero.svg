<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Davis Higgins GitHub profile hero banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06111F"/>
      <stop offset="0.52" stop-color="#0A1B2E"/>
      <stop offset="1" stop-color="#102C47"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="220" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DFF4FF"/>
      <stop offset="0.5" stop-color="#8FCAE8"/>
      <stop offset="1" stop-color="#4B9FE1"/>
    </linearGradient>
    <linearGradient id="line" x1="72" y1="0" x2="742" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4B9FE1" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#4B9FE1" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#F7FBFF"/>
      <stop offset="0.82" stop-color="#4B9FE1" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#4B9FE1" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#FFFFFF" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="cardShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020814" flood-opacity="0.34"/>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .pulse { animation: pulse 3s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: .42; } 50% { opacity: .86; } }
    </style>
  </defs>

  <rect width="1200" height="360" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="34" fill="url(#grid)"/>
  <rect x="1" y="1" width="1198" height="358" rx="33" stroke="#B8D9F3" stroke-opacity="0.18"/>
  <circle cx="982" cy="132" r="194" fill="#4B9FE1" opacity="0.12" filter="url(#softGlow)"/>
  <circle cx="155" cy="310" r="150" fill="#B8D9F3" opacity="0.08" filter="url(#softGlow)"/>

  <path d="M70 292C231 238 387 238 546 281C709 325 884 310 1086 231" stroke="#4B9FE1" stroke-opacity="0.16" stroke-width="2"/>
  <path d="M676 76C762 35 904 44 994 116C1088 191 1057 292 936 313C815 333 683 281 636 194C606 139 623 101 676 76Z" stroke="#B8D9F3" stroke-opacity="0.24" stroke-width="1.4" stroke-dasharray="14 18"/>

  <g transform="translate(72 58)">
    <rect x="0" y="0" width="332" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.06" stroke="#B8D9F3" stroke-opacity="0.16"/>
    <circle cx="21" cy="17" r="5" fill="#4B9FE1" class="pulse"/>
    <text x="39" y="22" class="mono" fill="#DDEEFF" font-size="12">DATA SCIENCE / AI SYSTEMS / WEB BUILDS</text>
  </g>

  <g filter="url(#cardShadow)">
    <text x="72" y="165" class="sans" fill="#F7FBFF" font-size="72" font-weight="850">Davis Higgins</text>

    <g transform="translate(594 84)">
      <rect x="0" y="0" width="196" height="126" rx="32" fill="#071525" fill-opacity="0.88" stroke="#B8D9F3" stroke-opacity="0.22"/>
      <rect x="10" y="10" width="176" height="106" rx="25" fill="#FFFFFF" fill-opacity="0.045"/>
      <text x="28" y="79" class="sans" fill="url(#mark)" font-size="72" font-weight="900" font-style="italic">DH</text>
      <path d="M27 92C68 109 130 106 171 82" stroke="url(#mark)" stroke-width="8" stroke-linecap="round"/>
    </g>
  </g>

  <text x="76" y="226" class="sans" fill="#B8D9F3" font-size="24" font-weight="650">Data Science, AI Systems, and Premium Web Builds</text>
  <rect x="76" y="250" width="668" height="3" rx="2" fill="url(#line)"/>
  <text x="78" y="294" class="sans" fill="#E7F3FF" font-size="24" font-weight="520">Building sharper systems for smarter decisions.</text>

  <g transform="translate(842 78)">
    <rect x="0" y="0" width="230" height="48" rx="15" fill="#071525" fill-opacity="0.82" stroke="#B8D9F3" stroke-opacity="0.18"/>
    <text x="20" y="30" class="mono" fill="#F7FBFF" font-size="15">AI Product Systems</text>
  </g>
  <g transform="translate(888 150)">
    <rect x="0" y="0" width="226" height="48" rx="15" fill="#071525" fill-opacity="0.82" stroke="#B8D9F3" stroke-opacity="0.18"/>
    <text x="20" y="30" class="mono" fill="#F7FBFF" font-size="15">Analytics Dashboards</text>
  </g>
  <g transform="translate(820 224)">
    <rect x="0" y="0" width="220" height="48" rx="15" fill="#071525" fill-opacity="0.82" stroke="#B8D9F3" stroke-opacity="0.18"/>
    <text x="20" y="30" class="mono" fill="#F7FBFF" font-size="15">Higgins Digital</text>
  </g>
</svg>
