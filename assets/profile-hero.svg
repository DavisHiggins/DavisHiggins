<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Davis Higgins GitHub profile hero banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06101D"/>
      <stop offset="0.48" stop-color="#0A1B2F"/>
      <stop offset="1" stop-color="#0F2A45"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4B9FE1" stop-opacity="0.05"/>
      <stop offset="0.25" stop-color="#B8D9F3" stop-opacity="0.6"/>
      <stop offset="0.5" stop-color="#F7FBFF" stop-opacity="0.9"/>
      <stop offset="0.75" stop-color="#4B9FE1" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#4B9FE1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="lineSweep" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4B9FE1" stop-opacity="0"/>
      <stop offset="0.36" stop-color="#4B9FE1" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#F7FBFF"/>
      <stop offset="0.64" stop-color="#4B9FE1" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#4B9FE1" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1200 0" to="1200 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="11" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020814" flood-opacity="0.34"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .float { animation: float 7s ease-in-out infinite; }
      .float2 { animation: float2 8s ease-in-out infinite; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      .dash { stroke-dasharray: 12 18; animation: dash 13s linear infinite; }
      .scan { animation: scan 5.5s ease-in-out infinite; }
      @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
      @keyframes float2 { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(7px); } }
      @keyframes pulse { 0%,100% { opacity: .45; } 50% { opacity: 1; } }
      @keyframes dash { to { stroke-dashoffset: -220; } }
      @keyframes scan { 0%,100% { transform: translateY(-60px); opacity: 0; } 50% { transform: translateY(312px); opacity: .38; } }
    </style>
  </defs>

  <rect width="1200" height="360" rx="34" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="358" rx="33" stroke="url(#edge)" stroke-opacity="0.5"/>
  <rect width="1200" height="360" rx="34" fill="url(#grid)"/>
  <path d="M42 299C182 252 336 252 505 293C680 336 845 323 1036 248" stroke="#4B9FE1" stroke-opacity="0.18" stroke-width="2"/>
  <path class="dash" d="M620 76C722 24 889 31 984 111C1085 196 1052 305 925 325C802 344 662 292 608 197C579 145 585 94 620 76Z" stroke="#B8D9F3" stroke-opacity="0.42" stroke-width="1.3"/>
  <path class="dash" d="M696 103C772 66 895 72 963 132C1034 195 1011 278 919 296C829 314 724 274 685 204C664 166 670 120 696 103Z" stroke="#4B9FE1" stroke-opacity="0.58" stroke-width="1.2"/>

  <g transform="translate(74 58)">
    <rect x="0" y="0" width="342" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.07" stroke="#B8D9F3" stroke-opacity="0.18"/>
    <circle cx="23" cy="19" r="5" fill="#4B9FE1" class="pulse"/>
    <text x="42" y="25" class="mono" fill="#DDEEFF" font-size="13" letter-spacing="1.5">DATA SCIENCE / AI SYSTEMS / WEB BUILDS</text>
  </g>

  <g filter="url(#shadow)">
    <text x="74" y="165" class="sans" fill="#F7FBFF" font-size="70" font-weight="850" letter-spacing="-1.2">Davis Higgins</text>
    <rect x="586" y="93" width="174" height="104" rx="30" fill="#081421" fill-opacity="0.76" stroke="#B8D9F3" stroke-opacity="0.2"/>
    <image href="./dh-logo.png" x="607" y="97" width="132" height="92" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <text x="78" y="214" class="sans" fill="#B8D9F3" font-size="25" font-weight="650" letter-spacing="0.1">Data Science, AI Systems, and Premium Web Builds</text>
  <rect x="78" y="238" width="650" height="3" rx="2" fill="url(#lineSweep)"/>
  <text x="80" y="283" class="sans" fill="#E7F3FF" font-size="24" font-weight="520">Building sharper systems for smarter decisions.</text>

  <g class="float" transform="translate(806 76)">
    <rect x="0" y="0" width="246" height="52" rx="18" fill="#081421" fill-opacity="0.76" stroke="#B8D9F3" stroke-opacity="0.22"/>
    <text x="22" y="33" class="mono" fill="#F7FBFF" font-size="16">AI Product Systems</text>
  </g>
  <g class="float2" transform="translate(876 151)">
    <rect x="0" y="0" width="232" height="52" rx="18" fill="#081421" fill-opacity="0.76" stroke="#B8D9F3" stroke-opacity="0.22"/>
    <text x="22" y="33" class="mono" fill="#F7FBFF" font-size="16">Analytics Dashboards</text>
  </g>
  <g class="float" transform="translate(790 228)">
    <rect x="0" y="0" width="254" height="52" rx="18" fill="#081421" fill-opacity="0.76" stroke="#B8D9F3" stroke-opacity="0.22"/>
    <text x="22" y="33" class="mono" fill="#F7FBFF" font-size="16">Higgins Digital</text>
  </g>

  <rect class="scan" x="0" y="0" width="1200" height="34" fill="#B8D9F3" opacity="0.08"/>
</svg>
