<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Davis Higgins GitHub profile hero banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="0.45" stop-color="#09182B"/>
      <stop offset="1" stop-color="#102B46"/>
    </linearGradient>
    <linearGradient id="blueGlow" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4B9FE1" stop-opacity="0"/>
      <stop offset="0.25" stop-color="#4B9FE1"/>
      <stop offset="0.55" stop-color="#B8D9F3"/>
      <stop offset="0.8" stop-color="#4B9FE1"/>
      <stop offset="1" stop-color="#4B9FE1" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1200 0" to="1200 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#B8D9F3" stop-opacity="0.95"/>
      <stop offset="0.35" stop-color="#4B9FE1" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#4B9FE1" stop-opacity="0"/>
    </radialGradient>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .float1 { animation: float1 6s ease-in-out infinite; }
      .float2 { animation: float2 7s ease-in-out infinite; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      .dash { stroke-dasharray: 14 18; animation: dash 12s linear infinite; }
      .scan { animation: scan 4.8s ease-in-out infinite; }
      @keyframes float1 { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
      @keyframes float2 { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(8px); } }
      @keyframes pulse { 0%,100% { opacity: .45; } 50% { opacity: 1; } }
      @keyframes dash { to { stroke-dashoffset: -220; } }
      @keyframes scan { 0%,100% { transform: translateY(-40px); opacity: 0; } 50% { transform: translateY(290px); opacity: .55; } }
    </style>
  </defs>

  <rect width="1200" height="360" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="34" fill="url(#grid)"/>
  <ellipse cx="975" cy="170" rx="310" ry="210" fill="url(#orb)" opacity="0.25" filter="url(#softGlow)"/>
  <ellipse cx="160" cy="40" rx="160" ry="140" fill="#4B9FE1" opacity="0.08" filter="url(#softGlow)"/>

  <g opacity="0.52">
    <path class="dash" d="M748 92C826 34 958 35 1032 106C1107 178 1083 285 994 313C903 342 774 303 727 224C693 166 704 125 748 92Z" stroke="#B8D9F3" stroke-opacity="0.55" stroke-width="1.5"/>
    <path class="dash" d="M798 128C858 88 956 90 1010 141C1064 192 1048 268 982 290C915 312 818 286 782 229C756 187 765 151 798 128Z" stroke="#4B9FE1" stroke-opacity="0.75" stroke-width="1.3"/>
  </g>

  <g transform="translate(84 72)">
    <rect x="0" y="0" width="172" height="48" rx="24" fill="#FFFFFF" fill-opacity="0.075" stroke="#B8D9F3" stroke-opacity="0.23"/>
    <circle cx="27" cy="24" r="6" fill="#4B9FE1" class="pulse"/>
    <text x="46" y="30" class="mono" fill="#DDEEFF" font-size="15" letter-spacing="1.8">SYSTEM ONLINE</text>
  </g>

  <text x="84" y="168" class="sans" fill="#F7FBFF" font-size="66" font-weight="800" letter-spacing="-2.8">Davis Higgins</text>
  <text x="88" y="211" class="mono" fill="#B8D9F3" font-size="22" letter-spacing="0.5">Data Science × AI × Web Systems</text>
  <rect x="84" y="236" width="540" height="3" rx="2" fill="url(#blueGlow)"/>
  <text x="88" y="279" class="sans" fill="#DDEEFF" font-size="24" font-weight="500">Building sharper systems for smarter decisions.</text>

  <g class="float1" transform="translate(790 73)">
    <rect x="0" y="0" width="250" height="54" rx="18" fill="#081421" fill-opacity="0.72" stroke="#B8D9F3" stroke-opacity="0.22"/>
    <text x="24" y="35" class="mono" fill="#F7FBFF" font-size="17">AI Product Systems</text>
  </g>
  <g class="float2" transform="translate(878 153)">
    <rect x="0" y="0" width="230" height="54" rx="18" fill="#081421" fill-opacity="0.72" stroke="#B8D9F3" stroke-opacity="0.22"/>
    <text x="24" y="35" class="mono" fill="#F7FBFF" font-size="17">Analytics Dashboards</text>
  </g>
  <g class="float1" transform="translate(755 235)">
    <rect x="0" y="0" width="260" height="54" rx="18" fill="#081421" fill-opacity="0.72" stroke="#B8D9F3" stroke-opacity="0.22"/>
    <text x="24" y="35" class="mono" fill="#F7FBFF" font-size="17">Premium Web Builds</text>
  </g>

  <rect class="scan" x="0" y="0" width="1200" height="36" fill="#B8D9F3" opacity="0.08"/>
</svg>
